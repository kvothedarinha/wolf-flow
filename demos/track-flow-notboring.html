<title>Track Flow — Not Boring</title>
<style>
  :root {
    --bg: #f1f6f6;
    --card: #ffffff;
    --border: #e2eaea;
    --text: #1b2126;
    --muted: #64707a;
    --ink: #22282e;
    --ink-fg: #f6fafa;
    --accent: #46e0cd;
    --accent-fg: #0d3a34;
    --secondary: #e8efef;
    --flame: #e8930c;
    --danger: #d43a3a;
    --shadow: 0 1px 2px rgba(20, 30, 30, 0.06);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #151a1e;
      --card: #1f262b;
      --border: #2d363c;
      --text: #edf2f2;
      --muted: #93a0a8;
      --ink: #edf2f2;
      --ink-fg: #1b2126;
      --accent: #3ecfbd;
      --accent-fg: #0d3a34;
      --secondary: #2a3339;
      --danger: #f07474;
      --shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
    }
  }
  :root[data-theme="dark"] {
    --bg: #151a1e; --card: #1f262b; --border: #2d363c; --text: #edf2f2;
    --muted: #93a0a8; --ink: #edf2f2; --ink-fg: #1b2126; --accent: #3ecfbd;
    --accent-fg: #0d3a34; --secondary: #2a3339; --danger: #f07474;
    --shadow: 0 1px 2px rgba(0, 0, 0, 0.4);
  }
  :root[data-theme="light"] {
    --bg: #f1f6f6; --card: #ffffff; --border: #e2eaea; --text: #1b2126;
    --muted: #64707a; --ink: #22282e; --ink-fg: #f6fafa; --accent: #46e0cd;
    --accent-fg: #0d3a34; --secondary: #e8efef; --danger: #d43a3a;
    --shadow: 0 1px 2px rgba(20, 30, 30, 0.06);
  }

  * { box-sizing: border-box; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
    font-size: 15px;
    line-height: 1.45;
  }
  button { font: inherit; color: inherit; cursor: pointer; }
  button:focus-visible, input:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  svg { display: block; }

  .phone { max-width: 430px; margin: 0 auto; min-height: 100dvh; display: flex; flex-direction: column; }

  header.topbar {
    position: sticky; top: 0; z-index: 20;
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
    background: color-mix(in srgb, var(--bg) 88%, transparent);
    backdrop-filter: blur(8px);
    border-bottom: 1px solid var(--border);
  }
  .brand { display: flex; align-items: center; gap: 10px; }
  .brand-mark {
    width: 34px; height: 34px; border-radius: 11px;
    background: var(--accent); color: var(--accent-fg);
    display: grid; place-items: center;
  }
  .brand-name { font-weight: 800; font-size: 14px; letter-spacing: -0.01em; line-height: 1.1; }
  .brand-sub { font-size: 9px; letter-spacing: 0.12em; text-transform: uppercase; color: var(--muted); }
  .demo-chip {
    font-size: 11px; color: var(--muted);
    border: 1px dashed var(--border); border-radius: 999px;
    padding: 4px 10px; background: transparent;
  }

  main { flex: 1; padding: 20px 16px 92px; }
  h1 { font-size: 26px; font-weight: 800; letter-spacing: -0.02em; margin: 0 0 2px; text-wrap: balance; }
  h1::first-letter { text-transform: uppercase; }
  .page-sub { color: var(--muted); font-size: 13px; margin: 0 0 16px; }

  .card { background: var(--card); border: 1px solid var(--border); border-radius: 18px; box-shadow: var(--shadow); }
  .stack { display: flex; flex-direction: column; gap: 10px; }

  /* week strip */
  .week { display: grid; grid-template-columns: repeat(7, 1fr); gap: 6px; margin-bottom: 18px; }
  .week button {
    display: flex; flex-direction: column; align-items: center; gap: 2px;
    padding: 9px 0 7px; border: none; border-radius: 15px;
    background: var(--card); color: var(--muted);
    transition: background 0.15s;
  }
  .week button .dw { font-size: 10px; font-weight: 700; text-transform: uppercase; }
  .week button .dn { font-size: 14px; font-weight: 550; font-variant-numeric: tabular-nums; }
  .week button .todot { width: 4px; height: 4px; border-radius: 999px; background: currentColor; }
  .week button:disabled { background: transparent; opacity: 0.35; cursor: default; }
  .week button.sel { background: var(--accent); color: var(--accent-fg); }
  .week button.sel .dn, .week button.today .dn { font-weight: 800; }

  /* progress */
  .progress-card { padding: 14px 16px; margin-bottom: 14px; }
  .progress-head { display: flex; justify-content: space-between; font-size: 13px; margin-bottom: 8px; }
  .progress-head .label { color: var(--muted); }
  .progress-head .value { font-weight: 800; font-variant-numeric: tabular-nums; }
  .progress-track { height: 9px; border-radius: 999px; background: var(--secondary); overflow: hidden; }
  .progress-fill { height: 100%; border-radius: 999px; background: var(--accent); transition: width 0.35s ease; }

  /* habit rows */
  .habit-row { display: flex; align-items: center; gap: 12px; padding: 12px 14px; }
  .habit-row.done { opacity: 0.62; }
  .habit-ic { width: 44px; height: 44px; border-radius: 15px; flex-shrink: 0; display: grid; place-items: center; }
  .habit-info { flex: 1; min-width: 0; }
  .habit-name { font-size: 15px; font-weight: 650; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .habit-row.done .habit-name { text-decoration: line-through; color: var(--muted); }
  .habit-meta { font-size: 12px; color: var(--muted); display: flex; gap: 10px; align-items: center; font-variant-numeric: tabular-nums; }
  .streak { color: var(--flame); font-weight: 650; display: inline-flex; align-items: center; gap: 3px; }

  .check-btn {
    width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0;
    border: 2px solid var(--border); background: transparent;
    display: grid; place-items: center; color: transparent;
    transition: background 0.15s, border-color 0.15s, transform 0.1s;
  }
  .check-btn svg { transform: scale(0.5); transition: transform 0.15s; }
  .check-btn.on svg { transform: scale(1); }
  .list-card > .habit-row { border-top: 1px solid var(--border); }
  .list-card > .habit-row:first-child { border-top: none; }
  .ring-wrap { position: relative; width: 84px; height: 84px; flex-shrink: 0; }
  .ring-wrap svg { transform: rotate(-90deg); }
  .ring-center { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring-center b { font-size: 18px; font-weight: 800; font-variant-numeric: tabular-nums; line-height: 1; }
  .ring-center span { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .check-btn.on { color: #fff; }
  .check-btn:active { transform: scale(0.9); }
  @media (prefers-reduced-motion: reduce) { .check-btn, .progress-fill { transition: none; } }

  .empty {
    border: 1px dashed var(--border); border-radius: 18px; background: var(--secondary);
    padding: 32px 20px; text-align: center; color: var(--muted); font-size: 13px;
  }

  /* habits page */
  .page-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 16px; }
  .btn {
    border: none; border-radius: 999px; padding: 10px 18px;
    font-size: 13px; font-weight: 700;
    background: var(--ink); color: var(--ink-fg);
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn.ghost { background: transparent; color: var(--muted); padding: 8px; border-radius: 10px; }
  .btn.ghost:hover { background: var(--secondary); color: var(--text); }
  .btn.outline { background: transparent; color: var(--text); border: 1.5px solid var(--border); }
  .badge { display: inline-block; font-size: 10.5px; color: var(--muted); background: var(--secondary); border-radius: 999px; padding: 2px 9px; margin-top: 4px; }
  .section-label { font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 24px 0 8px; font-weight: 800; }
  .archived-list { opacity: 0.6; }
  .row-actions { display: flex; gap: 2px; }

  /* stats */
  .tiles { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; margin-bottom: 20px; }
  .tile { padding: 12px 13px; }
  .tile .t-label { font-size: 10.5px; color: var(--muted); display: flex; align-items: center; gap: 5px; margin-bottom: 4px; }
  .tile .t-value { font-size: 22px; font-weight: 800; font-variant-numeric: tabular-nums; }
  .heat-wrap { padding: 14px 16px; overflow-x: auto; }
  .heat-months { display: flex; gap: 3px; height: 12px; margin-bottom: 3px; }
  .heat-months div { width: 13px; flex-shrink: 0; font-size: 8.5px; font-weight: 700; text-transform: uppercase; color: var(--muted); }
  .heat { display: flex; gap: 3px; }
  .heat-col { display: flex; flex-direction: column; gap: 3px; }
  .heat-cell { width: 13px; height: 13px; border-radius: 3.5px; background: var(--secondary); }
  .heat-legend { display: flex; align-items: center; justify-content: flex-end; gap: 5px; margin-top: 10px; font-size: 10px; color: var(--muted); }
  .heat-legend .heat-cell { width: 10px; height: 10px; }
  .dow-head { display: flex; justify-content: flex-end; gap: 4px; padding-right: 14px; margin: 14px 0 5px; }
  .dow-head span { width: 24px; text-align: center; font-size: 9.5px; font-weight: 700; color: var(--muted); text-transform: uppercase; }
  .dots { display: flex; gap: 4px; }
  .dot { width: 24px; height: 24px; border-radius: 8px; background: var(--secondary); }
  .dot.off { opacity: 0.4; }

  /* bottom nav */
  nav.bottom {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 20;
    border-top: 1px solid var(--border);
    background: color-mix(in srgb, var(--card) 96%, transparent);
    backdrop-filter: blur(8px);
  }
  .nav-inner { max-width: 430px; margin: 0 auto; display: grid; grid-template-columns: repeat(3, 1fr); }
  .nav-btn { background: none; border: none; padding: 8px 0 10px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10.5px; color: var(--muted); }
  .nav-btn .pill { display: grid; place-items: center; width: 46px; height: 28px; border-radius: 999px; }
  .nav-btn.active { color: var(--text); font-weight: 700; }
  .nav-btn.active .pill { background: var(--accent); color: var(--accent-fg); }

  /* dialog */
  .overlay { position: fixed; inset: 0; z-index: 40; background: rgba(10, 14, 16, 0.5); display: none; align-items: flex-end; justify-content: center; }
  .overlay.open { display: flex; }
  .dialog {
    width: 100%; max-width: 430px; max-height: 88dvh; overflow-y: auto;
    background: var(--card); border: 1px solid var(--border);
    border-radius: 22px 22px 0 0; padding: 20px 18px 24px;
  }
  @media (min-width: 480px) { .overlay { align-items: center; padding: 16px; } .dialog { border-radius: 22px; } }
  .dialog h2 { margin: 0 0 16px; font-size: 18px; font-weight: 800; letter-spacing: -0.01em; }
  .field { margin-bottom: 14px; }
  .field label { display: block; font-size: 12.5px; font-weight: 650; margin-bottom: 6px; }
  .field input[type="text"] {
    width: 100%; padding: 10px 13px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--bg); color: var(--text); font-size: 14px;
  }
  .pick-row { display: flex; flex-wrap: wrap; gap: 6px; }
  .icon-pick { width: 40px; height: 40px; border-radius: 12px; border: none; background: var(--secondary); color: var(--muted); display: grid; place-items: center; }
  .icon-pick.on { background: var(--accent); color: var(--accent-fg); }
  .color-pick { width: 27px; height: 27px; border-radius: 999px; border: none; }
  .color-pick.on { box-shadow: 0 0 0 2px var(--card), 0 0 0 4px currentColor; transform: scale(1.08); }
  .seg { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; background: var(--secondary); border-radius: 12px; padding: 3px; }
  .seg button { border: none; background: transparent; border-radius: 9px; padding: 8px; font-size: 13px; color: var(--muted); }
  .seg button.on { background: var(--card); color: var(--text); font-weight: 700; box-shadow: var(--shadow); }
  .day-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; }
  .day-grid button, .num-row button { height: 36px; border: none; border-radius: 11px; background: var(--secondary); color: var(--muted); font-size: 12px; font-weight: 700; }
  .num-row { display: flex; gap: 5px; }
  .num-row button { width: 36px; }
  .day-grid button.on, .num-row button.on { background: var(--accent); color: var(--accent-fg); }
  .dialog-actions { display: flex; gap: 8px; margin-top: 18px; }
  .dialog-actions .btn { flex: 1; justify-content: center; padding: 12px; }


  /* detalhe do hábito */
  .detail-head { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
  .detail-head .habit-ic { width: 48px; height: 48px; border-radius: 16px; }
  .detail-head h1 { font-size: 20px; margin: 0; }
  .tiles2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
  .cal { padding: 14px 16px; }
  .cal-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .cal-head b { font-size: 14px; text-transform: capitalize; }
  .cal-nav { border: none; background: transparent; color: var(--muted); padding: 6px 10px; border-radius: 9px; font-size: 15px; }
  .cal-nav:hover:not(:disabled) { background: var(--secondary); }
  .cal-nav:disabled { opacity: 0.3; cursor: default; }
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); row-gap: 5px; }
  .cal-dow { text-align: center; font-size: 9.5px; font-weight: 700; text-transform: uppercase; color: var(--muted); margin-bottom: 4px; }
  .cal-day { position: relative; justify-self: center; width: 36px; height: 36px; border: none; border-radius: 12px; background: transparent; font-size: 13px; font-variant-numeric: tabular-nums; color: var(--muted); transition: background 0.15s; }
  .cal-day.sched { background: var(--secondary); color: var(--text); }
  .cal-day.done { color: #fff; font-weight: 700; }
  .cal-day.today:not(.done) { box-shadow: inset 0 0 0 2px var(--accent); }
  .cal-day:disabled { opacity: 0.35; cursor: default; }
  .cal-day .note-dot { position: absolute; bottom: 4px; left: 50%; transform: translateX(-50%); width: 4px; height: 4px; border-radius: 999px; background: rgba(255,255,255,0.9); }
  .cal-hint { font-size: 11px; color: var(--muted); text-align: center; margin: 8px 0 16px; }
  .detail-actions { display: flex; gap: 8px; flex-wrap: wrap; }
  .habit-link { display: flex; align-items: center; gap: 12px; flex: 1; min-width: 0; background: none; border: none; padding: 0; text-align: left; }


  .habit-row { position: relative; }
  .group-label { font-size: 11px; font-weight: 800; letter-spacing: 0.1em; text-transform: uppercase; color: var(--muted); margin: 16px 0 8px; }
  .group-label:first-child { margin-top: 0; }
  .cal-link { position: absolute; top: 50%; transform: translateY(-50%); height: 8px; left: -50%; width: 100%; z-index: 0; }
  .cal-day { position: relative; z-index: 1; }
  .cal-cell { position: relative; display: flex; justify-content: center; }
  .ach-row { margin-bottom: 14px; }
  .ach-title { font-size: 12px; font-weight: 800; color: var(--muted); margin-bottom: 8px; }
  .ach-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
  .ach { display: flex; flex-direction: column; align-items: center; gap: 6px; }
  .ach .gem { width: 48px; height: 48px; border-radius: 16px; transform: rotate(45deg); display: grid; place-items: center; background: var(--secondary); color: var(--muted); opacity: 0.6; }
  .ach .gem svg { transform: rotate(-45deg); }
  .ach.on .gem { background: var(--flame); color: #fff; opacity: 1; box-shadow: var(--shadow); }
  .ach span { font-size: 11px; color: var(--muted); font-variant-numeric: tabular-nums; }
  .ach.on span { font-weight: 800; color: var(--text); }


  .relapse-btn { width: 32px; height: 32px; border-radius: 9px; flex-shrink: 0; border: 2px solid var(--border); background: transparent; display: grid; place-items: center; color: var(--muted); transition: all 0.15s; }
  .relapse-btn.on { background: var(--danger); border-color: var(--danger); color: #fff; }
  .relapse-btn svg { transform: rotate(45deg); }
  .free-streak { color: #0e9f6e; font-weight: 650; display: inline-flex; align-items: center; gap: 3px; }
  .relapsed-label { color: var(--danger); font-weight: 650; }


  /* --- dose Not Boring --- */
  .card { box-shadow: 0 10px 30px rgba(15, 40, 40, 0.10), 0 2px 6px rgba(15, 40, 40, 0.06); }
  h1 { font-size: 30px; letter-spacing: -0.03em; }

  .hero {
    border-radius: 24px; padding: 22px 20px; margin-bottom: 16px;
    color: #fff; position: relative; overflow: hidden;
    box-shadow: 0 16px 40px rgba(15, 40, 40, 0.22);
  }
  .hero .pct {
    font-size: clamp(54px, 19vw, 80px); font-weight: 900; line-height: 0.95;
    letter-spacing: -0.04em; font-variant-numeric: tabular-nums;
    text-shadow: 0 6px 24px rgba(0,0,0,0.25);
  }
  .hero .sub { font-size: 15px; font-weight: 700; opacity: 0.9; margin-top: 6px; }
  .hero .shine {
    position: absolute; inset: 0;
    background: radial-gradient(120% 80% at 80% -10%, rgba(255,255,255,0.35), transparent 55%);
    pointer-events: none;
  }
  .hero.party { animation: partypulse 1.2s ease 2; }
  @keyframes partypulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.025); } }

  .habit-ic {
    box-shadow: inset 0 2px 0 rgba(255,255,255,0.45), inset 0 -2px 4px rgba(0,0,0,0.08),
      0 6px 14px rgba(15,40,40,0.12);
  }
  .check-btn.on svg, .relapse-btn.on svg { animation: springpop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
  @keyframes springpop { 0% { transform: scale(0.2); } 60% { transform: scale(1.25); } 100% { transform: scale(1); } }
  .check-btn, .relapse-btn, .btn, .week button, .cal-day { transition-timing-function: cubic-bezier(0.34, 1.56, 0.64, 1); }
  .check-btn:active, .relapse-btn:active { transform: scale(0.85); }

  .detail-hero {
    border-radius: 24px; padding: 20px; margin-bottom: 14px; color: #fff;
    position: relative; overflow: hidden; text-align: center;
    box-shadow: 0 16px 40px rgba(15,40,40,0.2);
  }
  .detail-hero .big {
    font-size: 84px; font-weight: 900; line-height: 0.95; letter-spacing: -0.04em;
    font-variant-numeric: tabular-nums; text-shadow: 0 6px 24px rgba(0,0,0,0.25);
  }
  .detail-hero .lbl { font-size: 13px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.12em; opacity: 0.85; margin-top: 4px; }

  #confetti { position: fixed; inset: 0; pointer-events: none; z-index: 90; }
  @media (prefers-reduced-motion: reduce) {
    .check-btn.on svg, .relapse-btn.on svg, .hero.party { animation: none; }
  }


  .hero-inner { display: flex; align-items: center; justify-content: space-between; gap: 8px; position: relative; }
  .hero-txt { min-width: 0; }
  #orb { width: 112px; height: 112px; flex-shrink: 0; filter: drop-shadow(0 10px 18px rgba(0,0,0,0.28)); }
  .hero { perspective: 900px; transform-style: preserve-3d; will-change: transform; }
  .check-btn { perspective: 300px; }
  .check-btn.on { animation: coinflip 0.55s cubic-bezier(0.34, 1.4, 0.64, 1); }
  @keyframes coinflip { 0% { transform: rotateY(0deg) scale(0.7); } 65% { transform: rotateY(360deg) scale(1.12); } 100% { transform: rotateY(360deg) scale(1); } }
  @media (prefers-reduced-motion: reduce) { .check-btn.on { animation: none; } }


  /* --- materiais 3D nas formas normais --- */
  .card {
    background-image: linear-gradient(180deg, rgba(255,255,255,0.55), rgba(255,255,255,0) 30%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.75),
      0 12px 32px rgba(15,40,40,0.12), 0 2px 6px rgba(15,40,40,0.07);
  }
  :root[data-theme="dark"] .card { background-image: linear-gradient(180deg, rgba(255,255,255,0.06), transparent 30%); box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 12px 32px rgba(0,0,0,0.45); }
  .habit-ic { background-image: radial-gradient(circle at 30% 22%, rgba(255,255,255,0.6), rgba(255,255,255,0) 58%); }
  .check-btn, .relapse-btn {
    background-image: linear-gradient(180deg, rgba(255,255,255,0.3), transparent 60%);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.7), 0 3px 0 rgba(15,40,40,0.08);
  }
  .check-btn.on, .relapse-btn.on {
    background-image: radial-gradient(circle at 30% 25%, rgba(255,255,255,0.5), rgba(255,255,255,0) 55%);
    box-shadow: inset 0 -2px 4px rgba(0,0,0,0.2), 0 4px 10px rgba(15,40,40,0.2);
  }
  .week button { box-shadow: 0 3px 0 rgba(15,40,40,0.09), 0 7px 14px rgba(15,40,40,0.08); }
  .week button:not(:disabled):active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(15,40,40,0.09); }
  .week button.sel {
    background-image: radial-gradient(130% 110% at 30% 0%, rgba(255,255,255,0.55), rgba(255,255,255,0) 55%);
    box-shadow: 0 3px 0 rgba(15,120,110,0.35), 0 10px 20px rgba(20,160,150,0.35);
  }
  .btn { background-image: linear-gradient(180deg, rgba(255,255,255,0.16), transparent 55%); box-shadow: 0 3px 0 rgba(0,0,0,0.28), 0 8px 18px rgba(15,40,40,0.2); }
  .btn:active { transform: translateY(2px); box-shadow: 0 1px 0 rgba(0,0,0,0.28); }
  .btn.ghost, .btn.ghost:active { box-shadow: none; background-image: none; transform: none; }

<script>

const COLORS = ["#0ea5a0","#10b981","#f59e0b","#ef4444","#0891b2","#db2777","#7c3aed","#65a30d"];

// ---------- ícones (paths lucide, stroke) ----------
const ICON_PATHS = {

  flame: '<path d="M8.5 14.5A2.5 2.5 0 0 0 11 12c0-1.38-.5-2-1-3-1.072-2.143-.224-4.054 2-6 .5 2.5 2 4.9 4 6.5 2 1.6 3 3.5 3 5.5a7 7 0 1 1-14 0c0-1.153.433-2.294 1-3a2.5 2.5 0 0 0 2.5 2.5z"/>',

  calendar: '<rect x="3" y="4" width="18" height="18" rx="2"/><path d="M16 2v4M8 2v4M3 10h18M9 16l2 2 4-4"/>',
  list: '<rect x="3" y="5" width="6" height="6" rx="1"/><path d="m3 17 2 2 4-4M13 6h8M13 12h8M13 18h8"/>',
  chart: '<path d="M3 3v16a2 2 0 0 0 2 2h16"/><path d="M18 17V9M13 17V5M8 17v-3"/>',
  pencil: '<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>',
  archive: '<rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8M10 12h4"/>',
  restore: '<rect x="2" y="3" width="20" height="5" rx="1"/><path d="M4 8v11a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8M9 15l3-3 3 3"/>',
  trash: '<path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6M8 6V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>',
  trend: '<path d="M22 7 13.5 15.5 8.5 10.5 2 17"/><path d="M16 7h6v6"/>',
  circlecheck: '<circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/>',
};
const HABIT_ICON_NAMES = ["check","droplet","activity","book","sun","moon","pen","heart","music"];
function svg(name, size, sw) {
  return '<svg width="' + (size||18) + '" height="' + (size||18) + '" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="' + (sw||2) + '" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' + (ICON_PATHS[name]||ICON_PATHS.check) + "</svg>";
}
document.getElementById("brand-icon").innerHTML = svg("waves", 17, 2);

// ---------- estado ----------
let state = load();
let tab = "today";
let detailId = null;
let detailMonthOffset = 0;
let editingId = null;
let selOffset = 0; // dias antes de hoje selecionados na faixa da semana

function key(d) {
  return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
}
function daysAgo(n) { const d = new Date(); d.setDate(d.getDate() - n); d.setHours(0,0,0,0); return d; }

function load() {
  try {
    const raw = localStorage.getItem(STORE_KEY);
    if (raw) return JSON.parse(raw);
  } catch (e) { /* store corrompido cai no seed */ }
  return seed();
}
function save() { localStorage.setItem(STORE_KEY, JSON.stringify(state)); }

function seed() {
  const habits = [
    { id: "h1", name: "Beber 2L de água", icon: "droplet", color: "#0891b2", group: "Saúde", frequency: "daily", weekdays: [0,1,2,3,4,5,6], target: 7, archived: false, rate: 0.85 },
    { id: "h2", name: "Correr 5km", icon: "activity", color: "#10b981", group: "Saúde", frequency: "daily", weekdays: [1,3,5], target: 3, archived: false, rate: 0.75 },
    { id: "h3", name: "Ler 20 páginas", icon: "book", color: "#7c3aed", frequency: "daily", weekdays: [0,1,2,3,4,5,6], target: 7, archived: false, rate: 0.6 },
    { id: "h4", name: "Meditar", icon: "sun", color: "#f59e0b", frequency: "weekly", weekdays: [0,1,2,3,4,5,6], target: 4, archived: false, rate: 0.55 },
    { id: "h5", name: "Não petiscar à noite", icon: "moon", color: "#ef4444", kind: "quit", group: "Saúde", frequency: "daily", weekdays: [0,1,2,3,4,5,6], target: 7, archived: false, rate: 0.1 },
  ];
  const entries = {};
  let rnd = 42;
  const rand = () => { rnd = (rnd * 1103515245 + 12345) % 2147483648; return rnd / 2147483648; };
  for (const h of habits) {
    entries[h.id] = [];
    for (let i = 1; i <= 115; i++) {
      const d = daysAgo(i);
      const scheduled = h.frequency === "weekly" || h.weekdays.includes(d.getDay());
      if (scheduled && rand() < h.rate) entries[h.id].push(key(d));
    }
  }
  return { habits: habits.map(({rate, ...h}) => h), entries };
}

// ---------- domínio ----------
const entrySet = (id) => new Set(state.entries[id] || []);
const isQuit = (h) => h.kind === "quit";
const isScheduled = (h, d) => isQuit(h) || h.frequency === "weekly" || h.weekdays.includes(d.getDay());
function freeStreak(h) {
  const set = entrySet(h.id);
  let n = 0;
  for (let i = 0; i < 400; i++) {
    if (set.has(key(daysAgo(i)))) break;
    n++;
  }
  return n;
}
const active = () => state.habits.filter((h) => !h.archived);

function streak(h) {
  const set = entrySet(h.id);
  if (h.frequency === "weekly") {
    let s = 0;
    let ws = new Date(); ws.setDate(ws.getDate() - ws.getDay()); ws.setHours(0,0,0,0);
    for (let w = 0; w < 60; w++) {
      let done = 0;
      for (let i = 0; i < 7; i++) { const d = new Date(ws); d.setDate(ws.getDate() + i); if (set.has(key(d))) done++; }
      if (done >= h.target) s++;
      else if (w > 0) break;
      ws.setDate(ws.getDate() - 7);
    }
    return s;
  }
  let s = 0;
  for (let i = 0; i < 365; i++) {
    const d = daysAgo(i);
    if (isScheduled(h, d)) {
      if (set.has(key(d))) s++;
      else if (i > 0) break;
    }
  }
  return s;
}

function weekCount(h) {
  const set = entrySet(h.id);
  let c = 0;
  for (let i = 0; i <= new Date().getDay(); i++) if (set.has(key(daysAgo(i)))) c++;
  return c;
}

function rate30(h) {
  const set = entrySet(h.id);
  if (h.frequency === "weekly") {
    let done = 0;
    for (let i = 0; i < 28; i++) if (set.has(key(daysAgo(i)))) done++;
    return Math.min(1, done / (4 * h.target));
  }
  let sched = 0, done = 0;
  for (let i = 0; i < 30; i++) {
    const d = daysAgo(i);
    if (!isScheduled(h, d)) continue;
    sched++;
    if (set.has(key(d))) done++;
  }
  return sched ? done / sched : 0;
}

// ---------- render ----------
const $ = (sel) => document.querySelector(sel);
const main = $("#main");
const MONTHS = ["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];
const WEEKDAYS_LONG = ["domingo","segunda-feira","terça-feira","quarta-feira","quinta-feira","sexta-feira","sábado"];

function esc(s) { return s.replace(/[&<>"']/g, (c) => ({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[c])); }

function habitRow(h, opts) {
  const set = entrySet(h.id);
  const dayKey = key(daysAgo(opts.check ? selOffset : 0));
  const done = set.has(dayKey);
  const meta = [];
  if (isQuit(h)) {
    if (done) meta.push('<span class="relapsed-label">Recaída registrada neste dia</span>');
    else {
      const f = freeStreak(h);
      meta.push('<span class="free-streak">' + svg("circlecheck", 12, 2.4) + f + (f === 1 ? " dia livre" : " dias livre") + "</span>");
    }
  } else {
    const s = streak(h);
    if (s > 0) meta.push('<span class="streak">' + svg("flame", 12, 2.4) + s + " " + (h.frequency === "weekly" ? (s === 1 ? "semana" : "semanas") : (s === 1 ? "dia" : "dias")) + "</span>");
    if (h.frequency === "weekly") meta.push(weekCount(h) + "/" + h.target + " esta semana");
  }
  return '<div class="habit-row' + (done && opts.check && !isQuit(h) ? " done" : "") + '" style="background:' + h.color + '12">' +
    '<button class="habit-link" data-open="' + h.id + '">' +
    '<div class="habit-ic" style="background:' + h.color + '22;color:' + h.color + '">' + svg(h.icon, 20, 2.2) + "</div>" +
    '<div class="habit-info"><div class="habit-name">' + esc(h.name) + "</div>" +
    (opts.check
      ? '<div class="habit-meta">' + (meta.join(" ") || "Comece uma sequência") + "</div>"
      : '<span class="badge">' + scheduleLabel(h) + "</span>") +
    "</div></button>" +
    (opts.check
      ? (isQuit(h)
        ? '<button class="relapse-btn' + (done ? " on" : "") + '" data-check="' + h.id + '" aria-label="Recaída de ' + esc(h.name) + '">' + svg("plus", 16, 3) + "</button>"
        : '<button class="check-btn' + (done ? " on" : "") + '" data-check="' + h.id + '" aria-label="Concluir ' + esc(h.name) + '"' +
        (done ? ' style="background:' + h.color + ";border-color:" + h.color + '"' : "") + ">" + svg("check", 20, 3) + "</button>")
      : '<div class="row-actions">' +
        '<button class="btn ghost" data-edit="' + h.id + '" aria-label="Editar">' + svg("pencil", 16) + "</button>" +
        '<button class="btn ghost" data-arch="' + h.id + '" aria-label="' + (h.archived ? "Reativar" : "Arquivar") + '">' + svg(h.archived ? "restore" : "archive", 16) + "</button>" +
        '<button class="btn ghost" data-del="' + h.id + '" aria-label="Excluir">' + svg("trash", 16) + "</button>" +
        "</div>") +
    "</div>";
}

function scheduleLabel(h) {
  if (h.frequency === "weekly") return h.target + "x por semana";
  if (h.weekdays.length === 7) return "Todos os dias";
  return h.weekdays.map((d) => DOW[d]).join(" ");
}


function groupedList(list, renderOpts) {
  const groups = new Map();
  for (const h of list) {
    const g = (h.group || "").trim() || null;
    if (!groups.has(g)) groups.set(g, []);
    groups.get(g).push(h);
  }
  const ordered = [...groups.entries()].sort((a, b) =>
    a[0] === null ? -1 : b[0] === null ? 1 : a[0].localeCompare(b[0], "pt-BR"));
  return ordered.map(([g, items]) =>
    (g ? '<div class="group-label">' + esc(g) + "</div>" : "") +
    '<div class="card list-card">' + items.map((h) => habitRow(h, renderOpts)).join("") + "</div>"
  ).join("");
}


function gradientFor(pct) {
  if (pct >= 1) return "linear-gradient(135deg,#ff9d2e 0%,#ff5e7e 45%,#a855f7 100%)";
  if (pct >= 0.66) return "linear-gradient(135deg,#0ea5a0 0%,#2dd4bf 55%,#38bdf8 100%)";
  if (pct > 0) return "linear-gradient(135deg,#155e63 0%,#0ea5a0 60%,#14b8a6 100%)";
  return "linear-gradient(135deg,#334155 0%,#3f5865 60%,#2f6b66 100%)";
}
function heroHtml(pct, doneN, total, isToday) {
  const msg = pct >= 1 ? "Dia perfeito!" : doneN + " de " + total + (isToday ? " hoje" : " neste dia");
  return '<div class="hero" id="day-hero" data-front="A">' +
    '<div class="g gA" style="background:' + gradientFor(pct) + ';opacity:1"></div>' +
    '<div class="g gB" style="opacity:0"></div>' +
    '<div class="shine"></div><div class="hero-inner">' +
    '<div class="hero-txt"><div class="pct">' + Math.round(pct * 100) + "%</div>" +
    '<div class="sub">' + msg + "</div></div>" +
    '<canvas id="orb" width="264" height="264"></canvas>' +
    "</div></div>";
}

function setHeroGradient(hero, pct) {
  const front = hero.dataset.front === "A" ? hero.querySelector(".gA") : hero.querySelector(".gB");
  const back = hero.dataset.front === "A" ? hero.querySelector(".gB") : hero.querySelector(".gA");
  back.style.background = gradientFor(pct);
  back.style.opacity = "1";
  front.style.opacity = "0";
  hero.dataset.front = hero.dataset.front === "A" ? "B" : "A";
}

function tweenPct(el, from, to) {
  const t0 = performance.now();
  const dur = 750;
  (function step(now) {
    const x = Math.min(1, (now - t0) / dur);
    const e = 1 - Math.pow(1 - x, 3);
    el.textContent = Math.round(from + (to - from) * e) + "%";
    if (x < 1) requestAnimationFrame(step);
  })(t0);
}

function updateHeroProgress(justChecked) {
  const day = daysAgo(selOffset);
  const k = key(day);
  const sched = active().filter((h) => isScheduled(h, day));
  const done = sched.filter((h) => {
    const has = entrySet(h.id).has(k);
    return isQuit(h) ? !has : has;
  }).length;
  const pct = sched.length ? done / sched.length : 0;
  const hero = document.getElementById("day-hero");
  if (hero) {
    setHeroGradient(hero, pct);
    const pctEl = hero.querySelector(".pct");
    const subEl = hero.querySelector(".sub");
    if (pctEl) tweenPct(pctEl, parseInt(pctEl.textContent, 10) || 0, Math.round(pct * 100));
    if (subEl)
      subEl.textContent =
        pct >= 1 ? "Dia perfeito!" : done + " de " + sched.length + (selOffset === 0 ? " hoje" : " neste dia");
  }
  orbSetProgress(pct);
  if (pct >= 1 && sched.length > 0 && justChecked) celebrate();
}

// ---------- orbe 3D (WebGL raymarching, sem bibliotecas) ----------
let orbRaf = 0;
let orbApi = null;
function orbSetProgress(v) {
  if (orbApi) orbApi.set(v);
}
function startOrb(pct) {
  cancelAnimationFrame(orbRaf);
  const canvas = document.getElementById("orb");
  if (!canvas) return;
  const gl = canvas.getContext("webgl", { alpha: true, premultipliedAlpha: true });
  if (!gl) return;

  const vs = "attribute vec2 a;void main(){gl_Position=vec4(a,0.,1.);}";
  const fs = [
    "precision highp float;",
    "uniform float t;uniform float p;uniform float m;uniform vec2 r;",
    "float sdCone(vec3 q,float h,float r1,float r2){",
    "  vec2 w=vec2(length(q.xz),q.y);",
    "  vec2 k1=vec2(r2,h);vec2 k2=vec2(r2-r1,2.0*h);",
    "  vec2 ca=vec2(w.x-min(w.x,(w.y<0.0)?r1:r2),abs(w.y)-h);",
    "  vec2 cb=w-k1+k2*clamp(dot(k1-w,k2)/dot(k2,k2),0.0,1.0);",
    "  float sg=(cb.x<0.0&&ca.y<0.0)?-1.0:1.0;",
    "  return sg*sqrt(min(dot(ca,ca),dot(cb,cb)));}",
    "float sdCyl(vec3 q,float h,float rad){",
    "  vec2 d=abs(vec2(length(q.xz),q.y))-vec2(rad,h);",
    "  return min(max(d.x,d.y),0.0)+length(max(d,0.0));}",
    "float trophy(vec3 q){",
    "  float cup=sdCone(q-vec3(0.0,0.20,0.0),0.22,0.15,0.40);",
    "  float lip=length(vec2(length(q.xz)-0.40,q.y-0.42))-0.035;",
    "  vec3 hq=vec3(abs(q.x),q.y,q.z);",
    "  float hnd=length(vec2(length(hq.xy-vec2(0.42,0.22))-0.13,hq.z))-0.032;",
    "  float stem=sdCyl(q-vec3(0.0,-0.12,0.0),0.12,0.055);",
    "  float knot=length(q-vec3(0.0,-0.02,0.0))-0.085;",
    "  float base=sdCyl(q-vec3(0.0,-0.30,0.0),0.05,0.24);",
    "  float base2=sdCyl(q-vec3(0.0,-0.38,0.0),0.035,0.31);",
    "  float d=min(cup,lip);d=min(d,hnd);d=min(d,stem);d=min(d,knot);d=min(d,base);d=min(d,base2);",
    "  return d;}",
    "float blob(vec3 q){",
    "  float w=(0.05+0.05*p)*(1.0-m);",
    "  return length(q)-(0.52+w*sin(q.x*5.0+t*1.7)*sin(q.y*6.0-t*1.3)*sin(q.z*4.0+t*1.1));}",
    "float map(vec3 q){return mix(blob(q),trophy(q),m);}",
    "vec3 nrm(vec3 q){vec2 e=vec2(0.002,0.0);",
    "  return normalize(vec3(map(q+e.xyy)-map(q-e.xyy),map(q+e.yxy)-map(q-e.yxy),map(q+e.yyx)-map(q-e.yyx)));}",
    "void main(){",
    "  vec2 uv=(gl_FragCoord.xy*2.0-r)/r.y;",
    "  vec3 ro=vec3(0.0,0.05,2.1);vec3 rd=normalize(vec3(uv,-1.9));",
    "  float ca=t*0.4;mat2 rot=mat2(cos(ca),-sin(ca),sin(ca),cos(ca));",
    "  ro.xz*=rot;rd.xz*=rot;",
    "  float sr=0.0;vec3 q;bool hit=false;",
    "  for(int i=0;i<80;i++){q=ro+rd*sr;float d=map(q);if(d<0.001){hit=true;break;}sr+=d*0.9;if(sr>4.0)break;}",
    "  if(!hit){gl_FragColor=vec4(0.0);return;}",
    "  vec3 n=nrm(q);vec3 l=normalize(vec3(0.6,0.8,0.5));",
    "  float dif=max(dot(n,l),0.0);",
    "  float spec=pow(max(dot(reflect(-l,n),-rd),0.0),mix(40.0,70.0,m));",
    "  float fres=pow(1.0-max(dot(n,-rd),0.0),2.5);",
    "  vec3 cold=vec3(0.45,0.95,0.88);vec3 hot=vec3(1.0,0.55,0.42);",
    "  vec3 gold=vec3(1.05,0.78,0.28);",
    "  vec3 base=mix(mix(cold,hot,p),gold,m);",
    "  vec3 col=base*(0.55+0.6*dif)+vec3(1.0)*spec*mix(0.9,1.4,m)+vec3(1.0)*fres*0.35+base*fres*0.5;",
    "  gl_FragColor=vec4(col,1.0);}",
  ].join("\n");

  function shader(type, src) {
    const sh = gl.createShader(type);
    gl.shaderSource(sh, src);
    gl.compileShader(sh);
    return sh;
  }
  const prog = gl.createProgram();
  gl.attachShader(prog, shader(gl.VERTEX_SHADER, vs));
  gl.attachShader(prog, shader(gl.FRAGMENT_SHADER, fs));
  gl.linkProgram(prog);
  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) return;
  gl.useProgram(prog);

  const buf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, buf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1, -1, 3, -1, -1, 3]), gl.STATIC_DRAW);
  const loc = gl.getAttribLocation(prog, "a");
  gl.enableVertexAttribArray(loc);
  gl.vertexAttribPointer(loc, 2, gl.FLOAT, false, 0, 0);

  const uT = gl.getUniformLocation(prog, "t");
  const uP = gl.getUniformLocation(prog, "p");
  const uM = gl.getUniformLocation(prog, "m");
  const uR = gl.getUniformLocation(prog, "r");
  gl.viewport(0, 0, canvas.width, canvas.height);
  gl.uniform2f(uR, canvas.width, canvas.height);
  gl.uniform1f(uP, pct);

  const reduced = matchMedia("(prefers-reduced-motion: reduce)").matches;
  let pCur = pct;
  let pTarget = pct;
  let morph = reduced && pct >= 1 ? 1 : 0;
  orbApi = { set(v) { pTarget = v; } };
  const t0 = performance.now();
  function frame(now) {
    pCur += (pTarget - pCur) * 0.05;
    const morphTarget = pTarget >= 1 ? 1 : 0;
    morph += (morphTarget - morph) * 0.022;
    const mEase = morph * morph * (3.0 - 2.0 * morph); // suaviza entrada e saída
    gl.uniform1f(uT, (now - t0) / 1000);
    gl.uniform1f(uP, pCur);
    gl.uniform1f(uM, mEase);
    gl.drawArrays(gl.TRIANGLES, 0, 3);
    if (!reduced) orbRaf = requestAnimationFrame(frame);
  }
  frame(t0 + (reduced ? 1600 : 0));
}

// tilt 3D do hero com o ponteiro
function attachTilt() {
  const hero = document.getElementById("day-hero");
  if (!hero) return;
  hero.addEventListener("pointermove", (ev) => {
    const b = hero.getBoundingClientRect();
    const rx = ((ev.clientY - b.top) / b.height - 0.5) * -7;
    const ry = ((ev.clientX - b.left) / b.width - 0.5) * 7;
    hero.style.transform = "rotateX(" + rx + "deg) rotateY(" + ry + "deg)";
  });
  hero.addEventListener("pointerleave", () => {
    hero.style.transform = "";
  });
}
let confettiRunning = false;
function fireConfetti() {
  if (confettiRunning) return;
  const canvas = document.getElementById("confetti");
  const ctx = canvas.getContext("2d");
  canvas.width = innerWidth; canvas.height = innerHeight;
  const colors = ["#ff9d2e", "#ff5e7e", "#a855f7", "#46e0cd", "#38bdf8", "#facc15"];
  const parts = Array.from({ length: 110 }, () => ({
    x: Math.random() * canvas.width,
    y: -20 - Math.random() * canvas.height * 0.4,
    r: 4 + Math.random() * 5,
    c: colors[(Math.random() * colors.length) | 0],
    vy: 2.5 + Math.random() * 3.5,
    vx: -1.5 + Math.random() * 3,
    rot: Math.random() * Math.PI,
    vr: -0.15 + Math.random() * 0.3,
  }));
  confettiRunning = true;
  const t0 = performance.now();
  (function frame(t) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);
    for (const p of parts) {
      p.x += p.vx; p.y += p.vy; p.rot += p.vr;
      ctx.save(); ctx.translate(p.x, p.y); ctx.rotate(p.rot);
      ctx.fillStyle = p.c; ctx.fillRect(-p.r, -p.r / 2, p.r * 2, p.r);
      ctx.restore();
    }
    if (t - t0 < 2400) requestAnimationFrame(frame);
    else { ctx.clearRect(0, 0, canvas.width, canvas.height); confettiRunning = false; }
  })(t0);
}
function popSound() {
  try {
    const ac = new (window.AudioContext || window.webkitAudioContext)();
    const o = ac.createOscillator(); const g = ac.createGain();
    o.connect(g); g.connect(ac.destination);
    o.type = "sine"; o.frequency.setValueAtTime(520, ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(880, ac.currentTime + 0.12);
    g.gain.setValueAtTime(0.12, ac.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ac.currentTime + 0.3);
    o.start(); o.stop(ac.currentTime + 0.32);
  } catch (e) { /* sem áudio, sem drama */ }
}
function celebrate() {
  fireConfetti();
  popSound();

}

function renderToday() {
  const today = daysAgo(0);
  const selected = daysAgo(selOffset);
  const isToday = selOffset === 0;
  const sched = active().filter((h) => isScheduled(h, selected));
  const dayKey = key(selected);
  const doneN = sched.filter((h) => {
    const has = entrySet(h.id).has(dayKey);
    return isQuit(h) ? !has : has;
  }).length;

  const hr = new Date().getHours();
  const hello = hr < 5 ? "Boa madrugada" : hr < 12 ? "Bom dia" : hr < 18 ? "Boa tarde" : "Boa noite";
  let html = "<h1>" + (isToday ? hello : WEEKDAYS_LONG[selected.getDay()]) + "</h1>" +
    "<p class='page-sub'>" + selected.getDate() + " de " + MONTHS[selected.getMonth()] + "</p>";

  // faixa da semana (domingo a sábado); dias passados são selecionáveis
  html += '<div class="week">';
  const weekStart = new Date(today); weekStart.setDate(today.getDate() - today.getDay());
  for (let i = 0; i < 7; i++) {
    const d = new Date(weekStart); d.setDate(weekStart.getDate() + i);
    const offset = Math.round((today - d) / 86400000);
    const future = offset < 0;
    const cls = (offset === selOffset ? "sel " : "") + (offset === 0 ? "today" : "");
    html += '<button class="' + cls + '" data-day-offset="' + offset + '"' + (future ? " disabled" : "") +
      ' aria-label="' + WEEKDAYS_LONG[d.getDay()] + ", " + d.getDate() + '">' +
      '<span class="dw">' + DOW[d.getDay()] + '</span><span class="dn">' + d.getDate() + "</span>" +
      (offset === 0 ? '<span class="todot"></span>' : "") + "</button>";
  }
  html += "</div>";

  if (sched.length) {
    const pct = doneN / sched.length;
    html += heroHtml(pct, doneN, sched.length, isToday);
    html += groupedList(sched, { check: true });
  } else {
    html += '<div class="empty">Nenhum hábito agendado para este dia.</div>';
  }
  main.innerHTML = html;
  if (sched.length) {
    startOrb(doneN / sched.length);
    attachTilt();
  }
}

function renderStats() {
  const last7 = []; for (let i = 6; i >= 0; i--) last7.push(daysAgo(i));
  const total7 = active().reduce((n, h) => { const s = entrySet(h.id); return n + last7.filter((d) => s.has(key(d))).length; }, 0);
  const best = active().reduce((m, h) => Math.max(m, streak(h)), 0);
  const avg = active().length ? active().reduce((s, h) => s + rate30(h), 0) / active().length : 0;

  let html = "<h1>Estatísticas</h1><p class='page-sub'>Seu progresso ao longo do tempo</p>";
  html += '<div class="tiles">' +
    tile("circlecheck", "Check-ins (7d)", total7) +
    tile("flame", "Maior streak", best) +
    tile("trend", "Taxa (30d)", Math.round(avg * 100) + "%") + "</div>";

  if (!active().length) {
    html += '<div class="empty">Crie hábitos para ver estatísticas.</div>';
    main.innerHTML = html;
    return;
  }

  // histórico geral: mapa de calor das últimas ~16 semanas, todos os hábitos
  html += '<div class="section-label" style="margin-top:0">Histórico geral</div>';
  const doneByDay = new Map();
  for (const id in state.entries) for (const k of state.entries[id]) doneByDay.set(k, (doneByDay.get(k) || 0) + 1);
  const today = daysAgo(0);
  const HIST = 112; // 16 semanas
  const first = daysAgo(HIST); first.setDate(first.getDate() - first.getDay());
  const weeks = Math.ceil((HIST + today.getDay() + 1) / 7);
  let months = "", cols = "";
  for (let w = 0; w < weeks; w++) {
    const ws = new Date(first); ws.setDate(first.getDate() + w * 7);
    months += "<div>" + (ws.getDate() <= 7 ? MONTHS[ws.getMonth()] : "") + "</div>";
    let cells = "";
    for (let d = 0; d < 7; d++) {
      const day = new Date(ws); day.setDate(ws.getDate() + d);
      if (day > today) { cells += '<div class="heat-cell" style="background:transparent"></div>'; continue; }
      const schedN = active().filter((h) => isScheduled(h, day)).length;
      const doneN = doneByDay.get(key(day)) || 0;
      const ratio = schedN ? Math.min(1, doneN / schedN) : 0;
      const bg = ratio === 0 ? "var(--secondary)" : "color-mix(in srgb, var(--accent) " + Math.round(25 + ratio * 75) + "%, var(--secondary))";
      cells += '<div class="heat-cell" style="background:' + bg + '" title="' + day.getDate() + " de " + MONTHS[day.getMonth()] + ": " + doneN + ' check-in(s)"></div>';
    }
    cols += '<div class="heat-col">' + cells + "</div>";
  }
  html += '<div class="card heat-wrap"><div class="heat-months">' + months + '</div><div class="heat">' + cols + "</div>" +
    '<div class="heat-legend">Menos' +
    [0, 0.33, 0.66, 1].map((r) => '<div class="heat-cell" style="background:' + (r === 0 ? "var(--secondary)" : "color-mix(in srgb, var(--accent) " + Math.round(25 + r * 75) + "%, var(--secondary))") + '"></div>').join("") +
    "Mais</div></div>";

  // últimos 7 dias por hábito
  html += '<div class="section-label">Últimos 7 dias por hábito</div>';
  html += '<div class="dow-head" style="margin-top:0">' + last7.map((d) => "<span>" + DOW[d.getDay()] + "</span>").join("") + "</div>";
  html += '<div class="stack">' + active().map((h) => {
    const set = entrySet(h.id);
    const dots = last7.map((d) => {
      const done = set.has(key(d));
      const off = !isScheduled(h, d);
      return '<div class="dot' + (off && !done ? " off" : "") + '"' + (done ? ' style="background:' + h.color + '"' : "") + "></div>";
    }).join("");
    const s = streak(h);
    return '<div class="card habit-row">' +
      '<div class="habit-ic" style="background:' + h.color + '22;color:' + h.color + '">' + svg(h.icon, 18, 2.2) + "</div>" +
      '<div class="habit-info"><div class="habit-name" style="font-size:14px">' + esc(h.name) + "</div>" +
      '<div class="habit-meta">' + Math.round(rate30(h) * 100) + "% em 30 dias" + (s ? ' <span class="streak">' + svg("flame", 11, 2.4) + s + "</span>" : "") + "</div></div>" +
      '<div class="dots">' + dots + "</div></div>";
  }).join("") + "</div>";

  // conquistas
  let bestAll = 0;
  for (const h of active()) {
    if (h.frequency === "weekly") continue;
    const set2 = entrySet(h.id);
    let run = 0;
    for (let i = 115; i >= 0; i--) {
      const d = daysAgo(i);
      if (!isScheduled(h, d)) continue;
      if (set2.has(key(d))) { run++; bestAll = Math.max(bestAll, run); }
      else if (i > 0) run = 0;
    }
  }
  const totalAll = Object.values(state.entries).reduce((n, l) => n + l.length, 0);
  const achBadge = (m, reached, unit, icon) =>
    '<div class="ach' + (reached >= m ? " on" : "") + '"><div class="gem">' + svg(icon, 20, 2.2) + "</div><span>" + m + (unit ? " " + unit : "") + "</span></div>";
  html += '<div class="section-label">Conquistas</div><div class="card" style="padding:16px">' +
    '<div class="ach-row"><div class="ach-title">Sequência mais longa</div><div class="ach-grid">' +
    [2, 5, 7, 14, 30, 60, 90, 180, 365].map((m) => achBadge(m, bestAll, "dias", "flame")).join("") + "</div></div>" +
    '<div class="ach-row" style="margin-bottom:0"><div class="ach-title">Check-ins totais</div><div class="ach-grid">' +
    [7, 30, 100, 250, 500, 1000].map((m) => achBadge(m, totalAll, "", "circlecheck")).join("") + "</div></div></div>";

  main.innerHTML = html;
}


function renderDetail() {
  const h = state.habits.find((x) => x.id === detailId);
  if (!h) { detailId = null; render(); return; }
  const set = entrySet(h.id);
  const today = daysAgo(0);
  const quit = isQuit(h);
  const s0 = quit ? freeStreak(h) : streak(h);
  const unit = h.frequency === "weekly" && !quit ? "sem" : "d";
  // melhor streak na janela
  let best = 0, run = 0;
  for (let i = 115; i >= 0; i--) {
    const d = daysAgo(i);
    if (!isScheduled(h, d)) continue;
    if (set.has(key(d))) { run++; best = Math.max(best, run); }
    else if (i > 0) run = 0;
  }
  let html = '<div class="detail-head">' +
    '<button class="btn ghost" data-back aria-label="Voltar">' + '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m12 19-7-7 7-7M19 12H5"/></svg>' + "</button>" +
    '<div class="habit-ic" style="background:' + h.color + '22;color:' + h.color + '">' + svg(h.icon, 22, 2.2) + "</div>" +
    "<div><h1>" + esc(h.name) + '</h1><span class="badge">' + scheduleLabel(h) + "</span></div></div>";

    '<div class="shine"></div><div class="big">' + s0 + '</div>' +
    '<div class="lbl">' + (quit ? (s0 === 1 ? "dia livre" : "dias livre") : (unit === "sem" ? "semanas seguidas" : "dias seguidos")) + "</div></div>";
  html += '<div class="tiles2">' +
    tile("flame", quit ? "Dias livre" : "Streak atual", s0 + unit) +
    tile("flame", quit ? "Melhor período" : "Melhor streak", best + unit) +
    tile("circlecheck", quit ? "Recaídas" : "Check-ins", (state.entries[h.id] || []).length) +
    tile("trend", "Taxa (30d)", Math.round((quit ? 1 - rate30(h) : rate30(h)) * 100) + "%") + "</div>";

  // calendário mensal
  const base = new Date(today.getFullYear(), today.getMonth() + detailMonthOffset, 1);
  const daysIn = new Date(base.getFullYear(), base.getMonth() + 1, 0).getDate();
  const leading = base.getDay();
  const monthName = MONTHS[base.getMonth()] + " " + base.getFullYear();
  html += '<div class="card cal"><div class="cal-head">' +
    '<button class="cal-nav" data-cal="-1"' + (detailMonthOffset <= -3 ? " disabled" : "") + '>&#8249;</button>' +
    "<b>" + monthName + "</b>" +
    '<button class="cal-nav" data-cal="1"' + (detailMonthOffset >= 0 ? " disabled" : "") + '>&#8250;</button></div>' +
    '<div class="cal-grid">' + DOW.map((d) => '<div class="cal-dow">' + d + "</div>").join("");
  for (let i = 0; i < leading; i++) html += "<div></div>";
  for (let d = 1; d <= daysIn; d++) {
    const date = new Date(base.getFullYear(), base.getMonth(), d);
    const k = key(date);
    const done = set.has(k);
    const future = date > today;
    const sched = isScheduled(h, date);
    const isToday = k === key(today);
    const prev = new Date(date); prev.setDate(date.getDate() - 1);
    const linked = !quit && done && date.getDay() !== 0 && set.has(key(prev));
    html += '<div class="cal-cell">' +
      (linked ? '<span class="cal-link" style="background:' + h.color + '55"></span>' : "") +
      '<button class="cal-day' + (done ? " done" : "") + (sched && !done && !quit ? " sched" : "") + (isToday ? " today" : "") + '"' +
      (future ? " disabled" : ' data-cal-day="' + k + '"') +
      (done ? ' style="background:' + (quit ? "var(--danger)" : h.color) + '"' : "") + ">" + d + "</button></div>";
  }
  html += "</div></div>" +
    '<p class="cal-hint">' + (quit ? "Toque num dia para registrar ou remover uma recaída." : "Toque num dia para marcar ou desmarcar o check-in.") + '</p>' +
    '<div class="detail-actions">' +
    '<button class="btn outline" data-edit="' + h.id + '">' + svg("pencil", 14) + "Editar</button>" +
    '<button class="btn outline" data-arch="' + h.id + '">' + svg(h.archived ? "restore" : "archive", 14) + (h.archived ? "Reativar" : "Arquivar") + "</button>" +
    '<button class="btn outline" style="color:var(--danger)" data-del="' + h.id + '">' + svg("trash", 14) + "Excluir</button></div>";
  main.innerHTML = html;
}

dialog.addEventListener("click", (ev) => {
  const t = ev.target.closest("button");
  if (!t) return;
  const nameInput = $("#f-name");
  if (nameInput) form.name = nameInput.value;
  if (t.dataset.kind) form.kind = t.dataset.kind;
  else if (t.dataset.icon) form.icon = t.dataset.icon;
  else if (t.dataset.color) form.color = t.dataset.color;
  else if (t.dataset.freq) form.frequency = t.dataset.freq;
  else if (t.dataset.day !== undefined) {
    const d = +t.dataset.day;
    form.weekdays = form.weekdays.includes(d) ? form.weekdays.filter((x) => x !== d) : [...form.weekdays, d].sort();
  } else if (t.dataset.num) form.target = +t.dataset.num;
  else if (t.id === "f-cancel") return closeForm();
  else if (t.id === "f-save") {
    if (!form.name.trim()) return toast("Dê um nome ao hábito");
    if (form.frequency === "daily" && !form.weekdays.length) return toast("Selecione pelo menos um dia");
    if (editingId) {
      Object.assign(state.habits.find((h) => h.id === editingId), { ...form, name: form.name.trim() });
      toast("Hábito atualizado");
    } else {
      const id = "h" + Date.now();
      state.habits.push({ id, archived: false, ...form, name: form.name.trim() });
      state.entries[id] = [];
      toast("Hábito criado");
    }
    save(); closeForm(); render();
    return;
  }
  renderForm();
});

  if (!t) return;
  if (t.id === "new-btn") return openForm(null);
  if (t.dataset.open) { detailId = t.dataset.open; detailMonthOffset = 0; render(); return; }
  if (t.hasAttribute("data-back")) { detailId = null; render(); return; }
  if (t.dataset.cal) { detailMonthOffset += +t.dataset.cal; render(); return; }
  if (t.dataset.calDay) {
    const list = state.entries[detailId] || (state.entries[detailId] = []);
    const i = list.indexOf(t.dataset.calDay);
    if (i >= 0) list.splice(i, 1); else list.push(t.dataset.calDay);
    save(); render(); return;
  }
  if (t.dataset.dayOffset !== undefined) { selOffset = +t.dataset.dayOffset; render(); return; }
  const h = (id) => state.habits.find((x) => x.id === id);
  if (t.dataset.check) {
    const habitId = t.dataset.check;
    const k = key(daysAgo(selOffset));
    const list = state.entries[habitId] || (state.entries[habitId] = []);
    const i = list.indexOf(k);
    if (i >= 0) list.splice(i, 1); else list.push(k);
    save();
    if (tab === "today" && !detailId) {
      // atualização fluida no lugar: só a linha e o hero mudam
      const h = state.habits.find((x) => x.id === habitId);
      const row = t.closest(".habit-row");
      if (h && row) row.outerHTML = habitRow(h, { check: true });
      updateHeroProgress(i < 0);
    } else {
      render();
    }
  } else if (t.dataset.edit) openForm(h(t.dataset.edit));
  else if (t.dataset.arch) {
    const hb = h(t.dataset.arch);
    hb.archived = !hb.archived;
    save(); render();
    toast(hb.archived ? "Hábito arquivado" : "Hábito reativado");
  } else if (t.dataset.del) {
    const hb = h(t.dataset.del);
    if (confirm('Excluir "' + hb.name + '"? Todo o histórico será apagado.')) {
      state.habits = state.habits.filter((x) => x.id !== hb.id);
      delete state.entries[hb.id];
      if (detailId === hb.id) detailId = null;
      save(); render();
      toast("Hábito excluído");
    }
  }
});

const THEMES = ["system", "light", "dark"];
let themeIdx = 0;
try { themeIdx = Math.max(0, THEMES.indexOf(localStorage.getItem("tf-demo-theme") || "system")); } catch (e) {}
function applyTheme() {
  const t = THEMES[themeIdx];
  if (t === "system") document.documentElement.removeAttribute("data-theme");
  else document.documentElement.setAttribute("data-theme", t);
  $("#theme-btn").textContent = "Tema: " + (t === "system" ? "sistema" : t === "light" ? "claro" : "escuro");
}
$("#theme-btn").addEventListener("click", () => {
  themeIdx = (themeIdx + 1) % 3;
  try { localStorage.setItem("tf-demo-theme", THEMES[themeIdx]); } catch (e) {}
  applyTheme();
});
applyTheme();

$("#reset-btn").addEventListener("click", () => {
  if (confirm("Reiniciar o demo com os dados de exemplo?")) {
    localStorage.removeItem(STORE_KEY);
    state = seed(); save(); selOffset = 0; render();
    toast("Demo reiniciado");
  }
});

// ---------- nav / toast ----------
const TABS = [
  { id: "today", label: "Hoje", icon: "calendar" },
  { id: "habits", label: "Hábitos", icon: "list" },
  { id: "stats", label: "Estatísticas", icon: "chart" },
];
const nav = $("#nav");
nav.innerHTML = TABS.map((t) => '<button class="nav-btn" data-tab="' + t.id + '"><span class="pill">' + svg(t.icon, 18) + "</span>" + t.label + "</button>").join("");
nav.addEventListener("click", (ev) => {
  const b = ev.target.closest("[data-tab]");
  if (b) { tab = b.dataset.tab; detailId = null; render(); }
});

let toastTimer;
function toast(msg) {
  const el = $("#toast");
  el.textContent = msg;
  el.classList.add("show");
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove("show"), 2200);
}

function render() {
  nav.querySelectorAll(".nav-btn").forEach((b) => b.classList.toggle("active", b.dataset.tab === tab));
  if (detailId) { renderDetail(); return; }
  if (tab === "today") renderToday();
  else if (tab === "habits") renderHabits();
  else renderStats();
}
render();
</script>
